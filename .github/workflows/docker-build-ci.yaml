name: "java-gradle-docker-container-workflow"
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  checks: write
  pull-requests: write
  contents: read
  packages: write  # CRITICAL: This allows GitHub Actions to publish images to GHCR

jobs:
  # ==========================================
  # JOB 1: Build & Compile
  # ==========================================
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version : '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Tests & Build Executable JAR
        run: ./gradlew clean build jacocoTestReport

      - name: Log test report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure()
        with:
          check_name: "JUnit Status Report"
          report_paths: '**/build/test-results/test/*.xml'

      - name: Temporarily Share Compiled Workspace
        uses: actions/upload-artifact@v4
        with:
          name: compiled-workspace
          path: |
            .
            ! .git
          retention-days: 1

  # ==========================================
  # JOB 2: Sonar Cloud Scan
  # ==========================================
  sonar_scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Workspace Output
        uses: actions/download-artifact@v4
        with:
          name: compiled-workspace

      - name: SonarCloud Scan Analysis
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Write Sonar Summary
        run: |
          echo "### 🔍 Code Quality Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| **SonarCloud Scan** | Analysis Transmitted Successfully ✅ |" >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # JOB 3: Build & Publish Image to GHCR Registry
  # ==========================================
  publish_docker_image:
    needs: [build, sonar_scan]
    runs-on: ubuntu-latest
    steps:
      - name: Download Workspace Output
        uses: actions/download-artifact@v4
        with:
          name: compiled-workspace

      # Automatically logs into GitHub Container Registry using built-in credentials
      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compiles your Dockerfile layout into a standardized image tag
      - name: Build and Push Docker Image
        run: |
          # Convert username to completely lowercase to satisfy Docker registry standards
          USER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/$USER_LOWER/customer-service-app"
          
          echo "Baking Image with tags..."
          docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:${{ github.sha }} .
          
          echo "Publishing Image out to Cloud Artifact Storage..."
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}

      - name: Write Publish Summary
        run: |
          USER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "### 📦 Container Registry Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Details |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Target Repository Target** | \`ghcr.io/$USER_LOWER/customer-service-app\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Registry Location** | GitHub Container Registry (GHCR) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | \`latest\` / \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | Pushed to Secure Packages Storage ✅ |" >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # JOB 4: Deploy & Run Container (Verification)
  # ==========================================
  deploy_and_run:
    needs: publish_docker_image
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and Spin Up Container Workspace
        run: |
          USER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_TARGET="ghcr.io/$USER_LOWER/customer-service-app:latest"
          
          echo "Pulling down image from secure package repository..."
          docker pull $IMAGE_TARGET
          
          echo "Launching background container process..."
          docker run -d -p 8081:8081 --name api-service $IMAGE_TARGET
          
          echo "Waiting 20 seconds for internal application initialization..."
          sleep 20
          
          echo "Printing live startup tracking information..."
          docker logs api-service
          
          echo "Executing HTTP POST Request..."
          curl -i -X POST \
            -H "Content-Type: application/json" \
            -d '{"custName":"Amazon","email":"amazon-markiting@amazon.com","location":"Ind-Bangalore"}' \
            http://localhost:8081/api/customers
          
          echo -e "\n--------------------------------------------------"
          
          echo "Executing HTTP GET Request to verify persistence..."
          curl -i -X GET http://localhost:8081/api/customers

      - name: Write Deployment Summary
        run: |
          echo "### 🚀 Live Container Runtime Environment Status" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Target Setting | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Engine Engine** | Docker Sandbox (Alpine Core) | Active Running |" >> $GITHUB_STEP_SUMMARY
          echo "| **Port Context Bridge** | \`8081:8081\` | Active Forwarding |" >> $GITHUB_STEP_SUMMARY
          echo "| **POST Integration** | \`/api/customers\` | Pass (200 OK) |" >> $GITHUB_STEP_SUMMARY
          echo "| **GET Integration** | \`/api/customers\` | Pass (Verified Persistence) ✅ |" >> $GITHUB_STEP_SUMMARY