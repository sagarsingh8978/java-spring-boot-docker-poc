sonar.projectKey=sagarsingh8978_java-spring-boot-docker-poc
sonar.projectName=sonar-learning-poc
sonar.host.url=https://sonarcloud.io

# ADD THIS LINE: Put your unique SonarCloud organization key here
sonar.organization=sonar-learning-poc

# Required for Java standalone scans: Tell Sonar where binaries and code live
sonar.sources=src/main/java
sonar.java.binaries=build/classes/java/main

# Scope scanning and coverage STRICTLY to your service layer
sonar.inclusions=**/service/**/*.java
sonar.coverage.inclusions=**/service/**/*.java
sonar.branch.name=main
# Exclusions
sonar.coverage.exclusions=**/model/**,**/dto/**,**/config/**,**/*Application.java,**/*Controller.java,**/*Repository.java

# Path to the JaCoCo XML report file generated by Gradle
sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml